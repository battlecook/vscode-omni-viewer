<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="{{plantumlTemplateBase}}">
    <title>PlantUML Viewer - {{fileName}}</title>
    <link rel="stylesheet" href="css/plantumlViewer.css">
</head>
<body>
    <div class="viewer-shell">
        <header class="viewer-header">
            <div>
                <div class="viewer-title">{{fileName}}</div>
                <div id="summaryText" class="viewer-subtitle">{{fileSize}} PlantUML diagram</div>
            </div>
            <div id="statusBadge" class="status-badge">Ready</div>
            {{omniShareButtons}}
        </header>

        <section class="toolbar">
            <div class="toolbar-group">
                <button type="button" class="toolbar-btn is-active" data-view-mode="diagram">Diagram</button>
                <button type="button" class="toolbar-btn" data-view-mode="split">Split</button>
                <button type="button" class="toolbar-btn" data-view-mode="source">Source</button>
            </div>
            <label class="select-field">
                <span>Mode</span>
                <select id="renderModeSelect">
                    <option value="light">Light</option>
                    <option value="dark">Dark</option>
                </select>
            </label>
            <div class="toolbar-group">
                <button type="button" class="toolbar-btn" id="zoomOutBtn">-</button>
                <button type="button" class="toolbar-btn" id="zoomResetBtn">100%</button>
                <button type="button" class="toolbar-btn" id="zoomInBtn">+</button>
            </div>
            <div class="toolbar-group">
                <button type="button" class="toolbar-btn" id="copySourceBtn">Copy Source</button>
            </div>
        </section>

        <main id="workspace" class="workspace">
            <section id="diagramPanel" class="panel diagram-panel">
                <div class="panel-header">
                    <span>Diagram</span>
                    <span id="diagramCaption" class="panel-caption">Initializing renderer</span>
                </div>
                <div id="diagramSurface" class="diagram-surface">
                    <div id="diagramOutput" class="diagram-output">
                        <img id="diagramImage" class="diagram-image" alt="Rendered PlantUML diagram">
                    </div>
                </div>
            </section>

            <section id="sourcePanel" class="panel source-panel">
                <div class="panel-header">
                    <span>Source</span>
                    <span id="sourceCaption" class="panel-caption">Read-only</span>
                </div>
                <textarea id="sourceView" class="source-view" spellcheck="false" readonly></textarea>
            </section>
        </main>

        <section id="messagePanel" class="message-panel is-hidden"></section>
    </div>

    <script src="https://cjrtnc.leaningtech.com/2.3/loader.js"></script>
    <script src="vendor/plantuml.js"></script>
    <script>
        window.plantumlSource = {{plantumlSource}};
    </script>
    <script src="js/plantumlViewer.js"></script>
</body>
</html>
