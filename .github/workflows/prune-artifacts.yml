name: Prune release artifacts

on:
  schedule:
    - cron: '17 3 * * 0'
  workflow_dispatch:

permissions:
  actions: write

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - name: Keep the five newest artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              },
            );

            artifacts.sort(
              (left, right) => new Date(right.created_at) - new Date(left.created_at),
            );

            const retainedByWorkflow = new Map();

            for (const artifact of artifacts) {
              const { data: run } = await github.rest.actions.getWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: artifact.workflow_run.id,
              });
              const retained = retainedByWorkflow.get(run.workflow_id) ?? 0;

              if (retained < 5) {
                retainedByWorkflow.set(run.workflow_id, retained + 1);
                continue;
              }

              core.info(`Deleting artifact ${artifact.id}: ${artifact.name}`);
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
            }
